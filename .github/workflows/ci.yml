name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'staging/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'staging/**'

permissions:
  actions: read
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db }}
      e2e: ${{ steps.filter.outputs.e2e }}
      storybook: ${{ steps.filter.outputs.storybook }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            db:
              - 'libs/movies-prisma-lib/**'
              - 'libs/movies-graphql-lib/**'
              - 'apps/movies-service/**'
              - 'development-db/**'
              - 'seed/**'
              - 'package.json'
              - 'package-lock.json'
              - 'nx.json'
              - 'tsconfig.base.json'
              - '.github/workflows/ci.yml'
            e2e:
              - 'apps/movies-ui/**'
              - 'apps/movies-service/**'
              - 'libs/movies-graphql-lib/**'
              - 'libs/movies-prisma-lib/**'
              - 'libs/shared-ui/**'
              - 'libs/shared-types/**'
              - 'development-db/**'
              - 'seed/**'
              - 'package.json'
              - 'package-lock.json'
              - 'nx.json'
              - 'tsconfig.base.json'
              - '.github/workflows/ci.yml'
            storybook:
              - 'libs/shared-ui/**'
              - 'libs/shared-types/**'
              - 'package.json'
              - 'package-lock.json'
              - 'nx.json'
              - 'tsconfig.base.json'
              - '.github/workflows/ci.yml'

  main:
    runs-on: ubuntu-latest
    needs: changes
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:7200/videodb
      GITHUB_ID: dummy
      GITHUB_SECRET: dummy
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # - run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci
      - uses: nrwl/nx-set-shas@v5

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: npx nx-cloud record -- echo Hello World
      # Run prisma generate first
      - run: npx nx run movies-prisma-lib:prisma-generate

      - name: Lint changed projects on PRs
        if: github.event_name == 'pull_request'
        run: npx nx affected -t lint --parallel

      - name: Lint all projects on main
        if: github.event_name != 'pull_request'
        run: npx nx run-many --all --parallel --targets=lint

      - name: Build changed projects on PRs
        if: github.event_name == 'pull_request'
        run: npx nx affected -t build --parallel

      - name: Build all projects on main
        if: github.event_name != 'pull_request'
        run: npx nx run-many --all --parallel --targets=build

      - name: Test changed projects on PRs
        if: github.event_name == 'pull_request'
        run: npx nx affected -t test --parallel --exclude=movies-prisma-lib,movies-service-e2e

      - name: Test all default projects on main
        if: github.event_name != 'pull_request'
        run: npx nx run-many --all --parallel --targets=test --exclude=movies-prisma-lib,movies-service-e2e

      - name: Start Storybook
        if: github.event_name != 'pull_request' || needs.changes.outputs.storybook == 'true'
        run: |
          npx nx run shared-ui:storybook --port 6006 --host 127.0.0.1 > storybook.log 2>&1 &
        env:
          CI: true # Set CI environment variable if needed

      - name: Install Playwright browsers
        if: github.event_name != 'pull_request' || needs.changes.outputs.storybook == 'true'
        run: npx playwright install chromium

      - name: Wait for Storybook to be ready
        if: github.event_name != 'pull_request' || needs.changes.outputs.storybook == 'true'
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:6006 > /dev/null; then
              echo "Storybook is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Storybook did not start in time"
          cat storybook.log
          exit 1

      - name: Run Storybook Tests
        if: github.event_name != 'pull_request' || needs.changes.outputs.storybook == 'true'
        run: npx nx run shared-ui:test-storybook --url http://127.0.0.1:6006

  movies-prisma-lib-test:
    name: movies-prisma-lib DB tests
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.db == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: Start development DB (docker-compose)
        env:
          MYSQL_DATABASE: videodb
          MYSQL_ROOT_PASSWORD: password
          DATABASE_HOST: 127.0.0.1
          DATABASE_USER: root
          DATABASE_PASSWORD: password
          DATABASE_PORT: 7200
          DATABASE_NAME: videodb
        run: |
          docker compose -f development-db/docker-compose.ci.yaml up -d movies-service-db
          # Wait for MySQL to be healthy
          CID=$(docker compose -f development-db/docker-compose.ci.yaml ps -q movies-service-db)
          echo "Waiting for DB to become healthy..."
          for i in {1..120}; do
            STATUS=$(docker inspect -f '{{json .State.Health.Status}}' "$CID" | tr -d '"')
            if [ "$STATUS" = "healthy" ]; then
              echo "DB healthy"; break; fi
            echo "Current status: $STATUS"; sleep 2;
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "DB did not become healthy in time"; docker logs "$CID"; exit 1; fi
          echo "Dumping initial DB state for debugging..."
          docker exec "$CID" mysql -uroot -ppassword -e "SELECT COUNT(*) AS usersettings_rows FROM videodb.homewebbridge_usermoviesettings;"
          docker exec "$CID" mysql -uroot -ppassword -e "SELECT COUNT(*) AS inventory_rows FROM videodb.homewebbridge_inventory;"
          docker exec "$CID" mysql -uroot -ppassword -e "SHOW TABLES FROM videodb;"

      - name: Run movies-prisma-lib tests (against DB)
        env:
          # Use host networking from the runner. Port 7200 is mapped by compose.
          DATABASE_URL: mysql://root:password@127.0.0.1:7200/videodb
          DATABASE_HOST: 127.0.0.1
          DATABASE_USER: root
          DATABASE_PASSWORD: password
          DATABASE_PORT: 7200
          DATABASE_NAME: videodb
          DEBUG: prisma:client
        run: |
          npx nx run movies-prisma-lib:test

      - name: Stop development DB
        if: always()
        run: docker compose -f development-db/docker-compose.ci.yaml down -v

  e2e-playwright:
    name: E2E Playwright (UI + DB + Service)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.e2e == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci

      - name: Start MySQL (docker-compose)
        env:
          MYSQL_DATABASE: videodb
          MYSQL_ROOT_PASSWORD: password
        run: |
          docker compose -f development-db/docker-compose.ci.yaml up -d movies-service-db
          CID=$(docker compose -f development-db/docker-compose.ci.yaml ps -q movies-service-db)
          echo "Waiting for DB to become healthy..."
          for i in {1..120}; do
            STATUS=$(docker inspect -f '{{json .State.Health.Status}}' "$CID" | tr -d '"')
            if [ "$STATUS" = "healthy" ]; then echo "DB healthy"; break; fi
            echo "Current status: $STATUS"; sleep 2;
          done
          if [ "$STATUS" != "healthy" ]; then echo "DB not healthy"; docker logs "$CID"; exit 1; fi

      - name: Build and start movies-service (GraphQL)
        env:
          DATABASE_URL: mysql://root:password@127.0.0.1:7200/videodb
          DATABASE_HOST: 127.0.0.1
          DATABASE_USER: root
          DATABASE_PASSWORD: password
          DATABASE_PORT: 7200
          DATABASE_NAME: videodb
          JWT_SECRET: qwertyuiopasdfghjklzxcvbnm123456
          PORT: 7100
        run: |
          npx nx serve movies-service --configuration=production &
          # Wait for GraphQL endpoint
          for i in {1..60}; do
            if curl -sS http://127.0.0.1:7100/graphql > /dev/null; then echo "Service up"; break; fi
            sleep 2;
          done

      - name: Build and start movies-ui (Next.js)
        env:
          GRAPHQL_URL: http://127.0.0.1:7100/graphql
          NEXTAUTH_URL: /api/auth
          NEXT_PUBLIC_TEST_MODE: "true"
          NEXT_PUBLIC_TEST_USERS: "tester@example.com,Tester,2"
          TEST_MODE: "true"
          # Stub required provider credentials
          GITHUB_ID: dummy
          GITHUB_SECRET: dummy
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          # Optional: allowed users list format "email,name,id;..."
          ALLOWED_USERS: "tester@example.com,Tester,2"
          GRAPHQL_PROXY_URL: http://localhost:3000/api/graphql-proxy
          JWT_SECRET: qwertyuiopasdfghjklzxcvbnm123456
        run: |
          cd apps/movies-ui
          NEXT_OUTPUT=server npx next build
          npx next start -p 3000 &
          for i in {1..60}; do
            if curl -sS http://127.0.0.1:3000/ > /dev/null; then echo "UI up"; break; fi
            sleep 2;
          done

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        run: |
          cd apps/movies-ui
          npx playwright test -c playwright.config.ts

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/movies-ui/playwright-report
          if-no-files-found: ignore

      - name: Teardown
        if: always()
        run: |
          pkill -f "node dist/apps/movies-service/main.js" || true
          pkill -f "next start" || true
          docker compose -f development-db/docker-compose.ci.yaml down -v
